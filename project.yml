name: SlopBowl
options:
  bundleIdPrefix: com.geneyoo
  deploymentTarget:
    iOS: "18.6"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: H32EKFDL92
    IPHONEOS_DEPLOYMENT_TARGET: "18.6"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SlopBowl:
    type: application
    platform: iOS
    sources:
      - path: SlopBowl/App
      - path: SlopBowl/Core
        excludes:
          - "**/.gitkeep"
      - path: SlopBowl/Features
        excludes:
          - "**/.gitkeep"
      - path: SlopBowl/UI
        excludes:
          - "**/.gitkeep"
    resources:
      - path: SlopBowl/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.geneyoo.slopbowl
        PRODUCT_NAME: SlopBowl
        INFOPLIST_FILE: SlopBowl/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_IDENTITY: "Apple Development"

  SlopBowlTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SlopBowlTests
    dependencies:
      - target: SlopBowl
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
